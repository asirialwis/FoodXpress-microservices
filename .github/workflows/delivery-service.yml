name: Delivery Service CI/CD to AWS ECS Fargate via Docker Hub

on:
  push:
    branches:
      - main
      - dev
      - delivery-service
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION_DELIVERY: ${{ secrets.AWS_REGION_DELIVERY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_DELIVERY }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE_DELIVERY }}
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: delivery-service
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME_DELIVERY }}/delivery-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../delivery-service
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test --if-present

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION_DELIVERY }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_DELIVERY }}
          password: ${{ secrets.DOCKERHUB_TOKEN_DELIVERY }}

      - name: Build and push image to Docker Hub
        id: build-image
        run: |
          docker build -t $DOCKERHUB_IMAGE:${{ github.sha }} .
          docker tag $DOCKERHUB_IMAGE:${{ github.sha }} $DOCKERHUB_IMAGE:latest
          docker push $DOCKERHUB_IMAGE:${{ github.sha }}
          docker push $DOCKERHUB_IMAGE:latest
          echo "image=$DOCKERHUB_IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Render Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            MONGODB_URI=${{ secrets.MONGODB_URI_DELIVERY }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL_DELIVERY }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true