name: Restaurant Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'restaurant-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'restaurant-service/**'

env:
  SERVICE_NAME: restaurant-service
  DOCKER_IMAGE: food-ordering-app/restaurant-service

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./restaurant-service

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './restaurant-service/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Run test coverage
        run: npm run test:cov -- --passWithNoTests

      - name: Build
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./restaurant-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_RESTAURANT }}
        with:
          args: --severity-threshold=high
          command: monitor
        continue-on-error: true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./restaurant-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_RESTAURANT }}
          password: ${{ secrets.DOCKERHUB_TOKEN_RESTAURANT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./restaurant-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_RESTAURANT }}/${{ env.SERVICE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME_RESTAURANT }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_RESTAURANT }}

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name restaurant-service \
              --resource-group FoodXpress-RG \
              --image docker.io/${{ secrets.DOCKERHUB_USERNAME_RESTAURANT }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
